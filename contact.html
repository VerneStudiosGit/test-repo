<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact Us</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: "class",
    }
  </script>
</head>
<body class="bg-white dark:bg-gray-900 min-h-screen flex flex-col transition-colors duration-300">
  <div class="bg-yellow-400 text-yellow-900 text-center py-2 font-bold uppercase tracking-wider sticky top-0 z-50">⚠️ Work in Progress - Estamos mejorando para ti ⚠️</div>
  <nav class="bg-white dark:bg-gray-800 shadow-md px-6 py-4 flex items-center justify-between transition-colors duration-300">
    <a href="index.html" class="text-xl font-bold">
      <span class="text-blue-500">H</span><span class="text-red-500">o</span><span class="text-yellow-400">l</span><span class="text-blue-500">a</span>
    </a>
    <div class="flex gap-6 text-lg items-center">
      <button id="theme-toggle" class="text-2xl hover:scale-110 transition-transform p-1" aria-label="Toggle Dark Mode">☀️</button>
      <a href="index.html" class="text-gray-600 dark:text-gray-300 hover:text-blue-500">Home</a>
      <a href="about.html" class="text-gray-600 dark:text-gray-300 hover:text-blue-500">About Us</a> 
      <a href="team.html" class="text-gray-600 dark:text-gray-300 hover:text-blue-500">Team</a>
      <a href="todo.html" class="text-gray-600 dark:text-gray-300 hover:text-blue-500">To-do List</a>
      <a href="contact.html" class="text-blue-500 font-semibold hover:text-blue-700">Contact</a>
      <a href="pong.html" class="text-gray-600 dark:text-gray-300 hover:text-blue-500">Pong</a>
    </div>
  </nav>

  <main class="flex-1 flex flex-col items-center justify-center px-6 py-12">
    <div class="w-full max-w-lg bg-gray-50 dark:bg-gray-800 rounded-lg shadow-lg p-8 transition-colors duration-300">
      <h1 class="text-3xl font-bold text-center mb-8 text-gray-800 dark:text-white">
        <span class="text-blue-500">C</span><span class="text-red-500">o</span><span class="text-yellow-400">n</span><span class="text-blue-500">t</span><span class="text-green-500">a</span><span class="text-red-500">c</span><span class="text-blue-500">t</span>
        <span class="mx-1"></span>
        <span class="text-yellow-400">U</span><span class="text-green-500">s</span>
      </h1>
      
      <form action="#" method="POST" class="space-y-6">
        <div>
          <label for="name" class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">Nombre</label>
          <input type="text" id="name" name="name" placeholder="Tu nombre" class="w-full px-4 py-2 border border-gray-300 dark:border-gray-600 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 bg-white dark:bg-gray-700 text-gray-900 dark:text-white transition-colors" required>
        </div>

        <div>
          <label for="email" class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">Correo Electrónico</label>
          <input type="email" id="email" name="email" placeholder="tu@email.com" class="w-full px-4 py-2 border border-gray-300 dark:border-gray-600 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 bg-white dark:bg-gray-700 text-gray-900 dark:text-white transition-colors" required>
        </div>

        <div>
          <label for="subject" class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">Asunto</label>
          <input type="text" id="subject" name="subject" placeholder="¿De qué quieres hablar?" class="w-full px-4 py-2 border border-gray-300 dark:border-gray-600 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 bg-white dark:bg-gray-700 text-gray-900 dark:text-white transition-colors" required>
        </div>

        <div>
          <label for="message" class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">Mensaje</label>
          <textarea id="message" name="message" rows="4" placeholder="Escribe tu mensaje aquí..." class="w-full px-4 py-2 border border-gray-300 dark:border-gray-600 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 bg-white dark:bg-gray-700 text-gray-900 dark:text-white transition-colors" required></textarea>
        </div>

        <button type="submit" class="w-full bg-blue-500 hover:bg-blue-600 text-white font-bold py-3 px-4 rounded-lg transition duration-300 transform hover:scale-[1.02]">
          Enviar Mensaje
        </button>
      </form>
    </div>
  </main>

  <footer class="bg-gray-50 dark:bg-gray-900 transition-colors duration-300 py-8 border-t border-gray-200 dark:border-gray-800 relative z-10">
    <div class="container mx-auto px-6 flex flex-col items-center">
      <p class="text-gray-600 dark:text-gray-400 mb-4 text-center">
        © 2024 Agile Agents Playground. All rights reserved.
      </p>
      <div class="flex gap-6">
        <a href="#" class="text-gray-400 hover:text-blue-500 font-medium transition-colors">Twitter</a>
        <a href="#" class="text-gray-400 hover:text-blue-600 font-medium transition-colors">Facebook</a>
        <a href="#" class="text-gray-400 hover:text-pink-500 font-medium transition-colors">Instagram</a>
        <a href="#" class="text-gray-400 hover:text-gray-800 font-medium transition-colors">GitHub</a>
      </div>
    </div>
  </footer>
  <script src="js/storage.js"></script>
  <script src="js/theme.js"></script>
</body>
</html>
