<!DOCTYPE html>
<html lang="es">
<head>

  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>To-do List</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: "class",
    }
  </script>
</head>
<body class="bg-white dark:bg-gray-900 min-h-screen flex flex-col transition-colors duration-300">
  <nav class="bg-white dark:bg-gray-800 shadow-md px-6 py-4 flex items-center justify-between transition-colors duration-300">
    <a href="index.html" class="text-xl font-bold">
      <span class="text-blue-500">H</span><span class="text-red-500">o</span><span class="text-yellow-400">l</span><span class="text-blue-500">a</span>
    </a>
    <div class="flex gap-6 text-lg items-center">
      <button id="theme-toggle" class="text-2xl hover:scale-110 transition-transform p-1" aria-label="Toggle Dark Mode">☀️</button>
      <a href="index.html" class="text-gray-600 dark:text-gray-300 hover:text-blue-500">Home</a>
      <a href="about.html" class="text-gray-600 dark:text-gray-300 hover:text-blue-500">About Us</a>
      <a href="todo.html" class="text-blue-500 font-semibold hover:text-blue-700">To-do List</a>
      <a href="contact.html" class="text-gray-600 dark:text-gray-300 hover:text-blue-500">Contact</a>
    </div>
  </nav>

  <main class="flex-1 flex flex-col items-center justify-center px-6 py-12">
    <div class="w-full max-w-2xl bg-gray-50 dark:bg-gray-800 rounded-lg shadow-lg p-8 transition-colors duration-300">
      <h1 class="text-3xl font-bold text-center mb-8 text-gray-800 dark:text-white">
        <span class="text-blue-500">T</span><span class="text-red-500">o</span><span class="text-yellow-400">d</span><span class="text-blue-500">o</span>

        <span class="text-green-500">L</span><span class="text-red-500">i</span><span class="text-blue-500">s</span><span class="text-yellow-400">t</span>
      </h1>
      
      <div class="space-y-4">
        <!-- Contenido base del módulo To-do List -->
        <p class="text-center text-gray-600 dark:text-gray-400">
          Bienvenido al módulo de lista de tareas. Aquí podrás gestionar tus pendientes.
        </p>
        <div class="flex justify-center">
             <span class="px-4 py-2 bg-blue-100 text-blue-800 text-sm font-medium rounded-full dark:bg-blue-900 dark:text-blue-300">Próximamente...</span>
        </div>
      </div>
    </div>
  </main>

  <footer class="bg-gray-50 dark:bg-gray-900 transition-colors duration-300 py-8 border-t border-gray-200 dark:border-gray-800 relative z-10">
    <div class="container mx-auto px-6 flex flex-col items-center">
      <p class="text-gray-600 dark:text-gray-400 mb-4 text-center">
        © 2024 Agile Agents Playground. All rights reserved.
      </p>
      <div class="flex gap-6">
        <a href="#" class="text-gray-400 hover:text-blue-500 font-medium transition-colors">Twitter</a>
        <a href="#" class="text-gray-400 hover:text-blue-600 font-medium transition-colors">Facebook</a>
        <a href="#" class="text-gray-400 hover:text-pink-500 font-medium transition-colors">Instagram</a>
        <a href="#" class="text-gray-400 hover:text-gray-800 font-medium transition-colors">GitHub</a>

    </div>

  <script src="js/theme.js"></script>

</html>
